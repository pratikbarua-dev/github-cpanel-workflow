<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heavy Glow Particle Cursor</title>
    <style>
        /* CSS: Pura screen black aur canvas full screen */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw;
        }
        canvas { 
            display: block; 
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <canvas id="canvas1"></canvas>

    <script>
        const canvas = document.getElementById('canvas1');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        let hue = 0;

        const mouse = { x: undefined, y: undefined };

        // Mouse hilaane par event
        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
            // Zyada color ke liye 10 particles ek baar mein
            for (let i = 0; i < 10; i++) {
                particlesArray.push(new Particle());
            }
        });

        class Particle {
            constructor() {
                this.x = mouse.x;
                this.y = mouse.y;
                this.size = Math.random() * 10 + 2; // Bade particles
                this.speedX = Math.random() * 5 - 2.5; // Phailne ki speed
                this.speedY = Math.random() * 5 - 2.5;
                this.color = 'hsl(' + hue + ', 100%, 50%)'; // Chamakdar rang
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.size > 0.2) this.size -= 0.15; // Particle gayab hone ki speed
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 25; // Bahut zyada glowing effect
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function handleParticles() {
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
                if (particlesArray[i].size <= 0.3) {
                    particlesArray.splice(i, 1);
                    i--;
                }
            }
        }

        function animate() {
            // Background ko har frame mein clean karna
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            handleParticles();
            hue += 5; // Rang tezi se badalna
            requestAnimationFrame(animate);
        }

        animate();

        // Screen resize fix
        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
